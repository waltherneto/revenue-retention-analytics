name: dbt CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔐 Create profiles.yml with dev and prod
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          revenue_analytics:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                database: "${{ secrets.SNOWFLAKE_DATABASE_DEV }}"
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                schema: "${{ secrets.SNOWFLAKE_SCHEMA }}"
                threads: 4
                client_session_keep_alive: false

              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                database: "${{ secrets.SNOWFLAKE_DATABASE_PROD }}"
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                schema: "${{ secrets.SNOWFLAKE_SCHEMA }}"
                threads: 4
                client_session_keep_alive: false
          EOF

      # 🎯 Select target dynamically
      - name: Select dbt target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DBT_TARGET=dev" >> $GITHUB_ENV
          else
            echo "DBT_TARGET=prod" >> $GITHUB_ENV
          fi

      - name: dbt deps
        working-directory: revenue_analytics
        run: dbt deps

      - name: dbt debug
        working-directory: revenue_analytics
        run: dbt debug --target $DBT_TARGET

      - name: dbt compile
        working-directory: revenue_analytics
        run: dbt compile --target $DBT_TARGET

      - name: dbt run
        working-directory: revenue_analytics
        run: dbt run --target $DBT_TARGET

      - name: dbt test
        working-directory: revenue_analytics
        run: dbt test --target $DBT_TARGET